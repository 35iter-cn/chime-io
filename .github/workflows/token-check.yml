name: NPM Token Expiry Reminder

on:
  schedule:
    # 每周一检查
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  check-token:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check NPM_TOKEN expiry
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Token 配置 - 每次轮换后更新这里
          TOKEN_CREATED="2026-04-09"
          EXPIRY_DAYS=90
          WARNING_DAYS=14

          # 计算剩余天数
          CREATED_EPOCH=$(date -d "$TOKEN_CREATED" +%s)
          NOW_EPOCH=$(date +%s)
          DAYS_PASSED=$(( (NOW_EPOCH - CREATED_EPOCH) / 86400 ))
          DAYS_LEFT=$(( EXPIRY_DAYS - DAYS_PASSED ))

          echo "Token 已使用 $DAYS_PASSED 天，还剩 $DAYS_LEFT 天"

          # 检查是否已存在未关闭的提醒 issue
          EXISTING_ISSUE=$(gh issue list \
            --repo ${{ github.repository }} \
            --label "maintenance,npm-token" \
            --state open \
            --json number \
            --jq '.[0].number' 2>/dev/null || echo "")

          # 如果即将过期
          if [ $DAYS_LEFT -le $WARNING_DAYS ]; then
            echo "⚠️ Token 即将过期，剩 $DAYS_LEFT 天"

            if [ -n "$EXISTING_ISSUE" ]; then
              echo "已存在未关闭的提醒 issue #$EXISTING_ISSUE，跳过创建"
              exit 0
            fi

            # 构建 issue body
            BODY=$(printf '## 提醒\n\nNPM_TOKEN 将于 **%s 天后**过期。\n\n- 创建日期: %s\n- 有效期: %s 天\n- 建议提前 %s 天轮换\n\n## 轮换步骤\n\n1. 访问 https://www.npmjs.com/settings/YOUR_USERNAME/tokens\n2. 创建新的 Granular Access Token (建议有效期 90 天)\n3. 更新 GitHub Secret: https://github.com/%s/settings/secrets/actions\n4. 更新本文件中的 TOKEN_CREATED 日期\n5. 关闭此 issue\n\n@%s' \
              "$DAYS_LEFT" "$TOKEN_CREATED" "$EXPIRY_DAYS" "$WARNING_DAYS" \
              "${{ github.repository }}" "${{ github.repository_owner }}")

            gh issue create \
              --title "⚠️ NPM Token 即将过期（剩 $DAYS_LEFT 天）" \
              --body "$BODY" \
              --label "maintenance,npm-token" \
              --repo ${{ github.repository }} || true
          else
            echo "✅ Token 状态正常，还剩 $DAYS_LEFT 天"

            # 如果有过期的提醒 issue，添加评论说明已续期
            if [ -n "$EXISTING_ISSUE" ] && [ $DAYS_LEFT -gt $WARNING_DAYS ]; then
              echo "检测到已续期，在 issue #$EXISTING_ISSUE 添加评论"
              gh issue comment "$EXISTING_ISSUE" \
                --body "✅ Token 已续期，当前剩余 $DAYS_LEFT 天" \
                --repo ${{ github.repository }} || true
            fi
          fi
