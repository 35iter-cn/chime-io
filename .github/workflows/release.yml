name: Release

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write  # For npm provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.6.0 --activate

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
            common/temp/pnpm-store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('common/config/rush/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: node common/scripts/install-run-rush.js install

      - name: Type check
        run: pnpm typecheck

      - name: Build packages
        run: node common/scripts/install-run-rush.js build

      - name: Run tests
        run: pnpm test

      - name: Verify change files
        run: node common/scripts/install-run-rush.js change --verify

      - name: Publish packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          node common/scripts/install-run-rush.js publish --publish --include-all --version-policy individual --set-access-level public
