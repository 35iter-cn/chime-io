name: Pre-release Build and Publish

on:
  push:
    branches: ['**']

permissions:
  contents: write
  id-token: write

jobs:
  prerelease:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, '[pre-release]')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.6.0 --activate

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('common/config/rush/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: node common/scripts/install-run-rush.js install

      - name: Rebuild packages
        run: node common/scripts/install-run-rush.js rebuild

      - name: Generate beta version
        id: beta
        run: |
          BETA_VERSION="beta.$(date +%Y%m%d%H%M%S)"
          echo "version=$BETA_VERSION" >> $GITHUB_OUTPUT
          echo "Beta version: $BETA_VERSION"

      - name: Publish prerelease
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          node common/scripts/install-run-rush.js publish --publish --prerelease-name ${{ steps.beta.outputs.version }} --tag beta --apply --target-branch ${{ github.ref_name }} --include-all --version-policy individual --set-access-level public
