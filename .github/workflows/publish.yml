name: Build and Publish

on:
  push:
    branches: [ main ]
  create:
    tags:      # keep builds on tag creation for release flow
      - 'v*'
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build all packages
        run: pnpm -w build

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build packages
        run: pnpm -w build

      - name: Publish packages (pack check then publish)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # configure npm auth for publish
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > ~/.npmrc
          set -euo pipefail
          publish_order=("packages/core" "packages/telegram" "packages/opencode" "apps/cli")
          for pkg in "${publish_order[@]}"; do
            if [ -f "$pkg/package.json" ]; then
              echo "--- Processing $pkg ---"
              cd $pkg
              name=$(node -p "require('./package.json').name")
              version=$(node -p "require('./package.json').version")
              echo "Checking $name@$version"
              echo "Dry-run pack"
              npm pack --dry-run
              # publish; fail the job if publish fails
              echo "Publishing $name@$version"
              npm publish --access public
              cd - >/dev/null
            fi
          done
